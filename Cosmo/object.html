<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoWiki — Объект</title>
    <meta name="description" content="Подробная информация о космическом объекте: характеристики, фотографии NASA, расчёт времени полёта с Земли.">
    <meta name="robots" content="index, follow">
    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="CosmoWiki — Объект">
    <meta property="og:description" content="Подробная информация о космическом объекте: характеристики, фотографии NASA, расчёт времени полёта.">
    <meta property="og:image" content="assets/og-preview.jpg">
    <meta property="og:locale" content="ru_RU">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CosmoWiki — Объект">
    <meta name="twitter:description" content="Подробная информация о космическом объекте с фотографиями NASA.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Фоновое видео космоса -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/space-bg.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Декоративные сферы -->
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-3"></div>

    <!-- Шапка -->
    <header class="header">
        <a href="index.html" class="logo">COSMO<span>WIKI</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="index.html#catalog" class="nav-link active">Каталог</a>
            <a href="spacex.html" class="nav-link">SpaceX</a>
            <a href="index.html#about" class="nav-link">О проекте</a>
        </nav>
    </header>

    <!-- Контент страницы объекта -->
    <main class="page-content">
        <!-- Хлебные крошки -->
        <nav class="breadcrumb" id="breadcrumb">
            <a href="index.html">Главная</a>
            <span class="breadcrumb-sep">/</span>
            <a href="" id="breadcrumb-category-link">Категория</a>
            <span class="breadcrumb-sep">/</span>
            <span id="breadcrumb-object">Объект</span>
        </nav>

        <!-- Герой объекта: фото + название -->
        <div class="object-hero" id="object-hero">
            <div class="object-hero-image" id="object-hero-image">
                <!-- Фото загружается через JS -->
                <div class="object-hero-placeholder">
                    <div class="spinner"></div>
                    <span>Загрузка изображения...</span>
                </div>
            </div>
            <div class="object-hero-info">
                <span class="object-hero-category" id="object-category-badge"></span>
                <h1 class="object-hero-title" id="object-title">Загрузка...</h1>
                <p class="object-hero-extract" id="object-extract"></p>
                <div class="object-hero-sources" id="object-sources"></div>
            </div>
        </div>

        <!-- Время полёта -->
        <div class="travel-block" id="travel-block" style="display:none">
            <div class="travel-icon">&#128640;</div>
            <div class="travel-content">
                <h3 class="travel-title">Время полёта с Земли</h3>
                <p class="travel-subtitle">при современных технологиях</p>
                <div class="travel-details" id="travel-details"></div>
            </div>
        </div>

        <!-- Параметры объекта -->
        <div class="params-section" id="params-section" style="display:none">
            <h2 class="params-title">Характеристики</h2>
            <div class="params-grid" id="params-grid">
                <!-- Заполняется через JS -->
            </div>
        </div>

        <!-- Галерея NASA -->
        <div class="nasa-gallery" id="nasa-gallery" style="display:none">
            <h2 class="params-title">Фотографии NASA</h2>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Заполняется через JS -->
            </div>
        </div>

    </main>

    <!-- Футер -->
    <footer class="footer">
        <p>&copy; 2026 CosmoWiki. Данные: <a href="https://ru.wikipedia.org" target="_blank">Википедия</a> · <a href="https://www.nasa.gov" target="_blank">NASA</a> · <a href="https://www.spacex.com" target="_blank">SpaceX</a> · <a href="https://naked-science.ru/article/top/gid-po-vselennoi-kto-est" target="_blank">Naked Science</a></p>
    </footer>

    <script src="js/catalog.js"></script>
    <script src="js/naked-science-data.js"></script>
    <script src="js/nasa-descriptions.js"></script>
    <script src="js/wiki-api.js"></script>
    <script src="js/nasa-api.js"></script>
    <script src="js/travel-time.js"></script>
    <script src="js/object.js"></script>
</body>
</html>

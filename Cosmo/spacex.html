<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoWiki — SpaceX</title>
    <meta name="description" content="SpaceX — последние запуски, ракеты и миссии компании Илона Маска. Falcon 9, Starship, Dragon и другие программы.">
    <meta name="keywords" content="SpaceX, Falcon 9, Starship, Dragon, запуски ракет, космические миссии, Илон Маск">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="spacex.html">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="CosmoWiki — SpaceX">
    <meta property="og:description" content="SpaceX — последние запуски, ракеты и миссии. Falcon 9, Starship, Dragon.">
    <meta property="og:image" content="assets/og-preview.jpg">
    <meta property="og:locale" content="ru_RU">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CosmoWiki — SpaceX">
    <meta name="twitter:description" content="SpaceX — последние запуски, ракеты и миссии. Falcon 9, Starship, Dragon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Фоновое видео космоса -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="assets/space-bg.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Декоративные сферы -->
    <div class="sphere sphere-1"></div>
    <div class="sphere sphere-3"></div>

    <!-- Шапка -->
    <header class="header">
        <a href="index.html" class="logo">COSMO<span>WIKI</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="index.html#catalog" class="nav-link">Каталог</a>
            <a href="spacex.html" class="nav-link active">SpaceX</a>
            <a href="orbit.html" class="nav-link">Орбиты</a>
            <a href="index.html#about" class="nav-link">О проекте</a>
        </nav>
    </header>

    <!-- Контент -->
    <main class="page-content">
        <!-- Хлебные крошки -->
        <nav class="breadcrumb">
            <a href="index.html">Главная</a>
            <span class="breadcrumb-sep">/</span>
            <span>SpaceX</span>
        </nav>

        <!-- О компании -->
        <div class="spacex-company" id="company-block">
            <div class="spacex-company-header">
                <h1 class="category-title">🚀 SpaceX</h1>
                <p class="category-description" id="company-summary">Загрузка данных...</p>
            </div>
            <div class="spacex-stats" id="company-stats">
                <!-- Заполняется через JS -->
            </div>
        </div>

        <!-- Ракеты -->
        <section class="spacex-section" id="rockets-section">
            <h2 class="spacex-section-title">Ракеты</h2>
            <div class="spacex-rockets-grid" id="rockets-grid">
                <!-- Заполняется через JS -->
            </div>
        </section>

        <!-- Статистика запусков -->
        <section class="spacex-section" id="launches-section">
            <h2 class="spacex-section-title">Статистика запусков</h2>
            <div class="spacex-launch-stats" id="launch-stats">
                <!-- Заполняется через JS -->
            </div>
            <div class="spacex-launch-chart" id="launch-chart">
                <!-- Столбчатая диаграмма по годам -->
            </div>
        </section>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <p>&copy; 2026 CosmoWiki. Данные: <a href="https://ru.wikipedia.org" target="_blank">Википедия</a> · <a href="https://www.nasa.gov" target="_blank">NASA</a> · <a href="https://www.spacex.com" target="_blank">SpaceX</a> · <a href="https://naked-science.ru/article/top/gid-po-vselennoi-kto-est" target="_blank">Naked Science</a></p>
    </footer>

    <script src="js/spacex-api.js"></script>
    <script src="js/spacex-page.js"></script>
</body>
</html>
